<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Інтерактивний калькулятор трактатів для гри. Розрахунок матеріалів, піраміда крафту та пошук.">
  <title>Калькулятор Трактатів | Craft Pyramid Project</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header">
      <div class="header-content">
        <div class="logo">
          <img src="iconset/m/logo.webp" alt="Логотип ЧорнаРада" title="ЧорнаРада" style="width:200px; height:auto; filter: drop-shadow(0 0 10px var(--accent-glow));">
          <h1>Калькулятор трактатів</h1>
        </div>
      </div>
    </header>

    <main class="content">
      <div class="search-container">
        <input type="text" id="searchBox" placeholder="Шукати трактат за назвою або рівнем..." aria-label="Пошук трактатів">
        <div id="searchResults" role="listbox"></div>
      </div>
      
      <div id="summary"></div>
      <div id="pyramid">
        <!-- Піраміда крафту буде згенерована динамічно -->
      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-content">
        <div class="footer-left">
          <h3>Craft Pyramid Project</h3>
          <p>Найповніша база знань для майстрів небесних трактатів.</p>
        </div>
        <div class="footer-right">
          <p>Powered by SoloFarm from <b>ЧорнаРада</b></p>
          <p>© 2026 ЧорнаРада. Всі права захищені.</p>
        </div>
      </div>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
