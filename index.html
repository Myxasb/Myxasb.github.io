<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Крафт трактатів</title>
  <style>
    body { font-family: sans-serif; text-align: center; }
    .tractate-name {
      display: inline-block;
      margin: 10px;
      padding: 10px;
      border: 1px solid #333;
      cursor: pointer;
    }
    .craft-structure {
      display: none;
      margin: 15px auto;
      border: 1px solid #666;
      padding: 10px;
      width: 60%;
      text-align: left;
    }
    .craft-structure ul { list-style: none; padding-left: 0; }
    .craft-structure li { margin: 5px 0; }
  </style>
</head>
<body>
  <h1>Трактати</h1>
  <div id="tractateList"></div>
  <div id="craftContainer"></div>

  <script>
    async function loadData() {
      const response = await fetch('data.json');
      const data = await response.json();

      const list = document.getElementById('tractateList');
      const container = document.getElementById('craftContainer');

      data.tractates.forEach(t => {
        // кнопка з назвою
        const btn = document.createElement('div');
        btn.className = 'tractate-name';
        btn.textContent = t.name;
        btn.onclick = () => toggleCraft(t);
        list.appendChild(btn);

        // блок зі структурою
        const block = document.createElement('div');
        block.id = t.id;
        block.className = 'craft-structure';
        block.innerHTML = `
          <h3>${t.name}</h3>
          <p><b>Характеристики:</b> ${t.stats}</p>
          <h4>Крафт:</h4>
          <ul>${t.craft.map(c => `<li>${c}</li>`).join('')}</ul>
        `;
        container.appendChild(block);
      });
    }

    function toggleCraft(t) {
      const block = document.getElementById(t.id);
      block.style.display = (block.style.display === "block") ? "none" : "block";
    }

    loadData();
  </script>
</body>
</html>
