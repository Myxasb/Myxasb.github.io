<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Повний шлях крафту</title>
  <style>
    body { font-family: sans-serif; text-align: center; }
    .tractate-name {
      display: inline-block;
      margin: 10px;
      padding: 10px;
      border: 1px solid #333;
      cursor: pointer;
    }
    .craft-path {
      margin: 15px auto;
      border: 1px solid #666;
      padding: 10px;
      width: 70%;
      text-align: left;
    }
    ul { list-style: none; padding-left: 20px; }
    li { margin: 5px 0; }
  </style>
</head>
<body>
  <h1>Крафт трактатів</h1>
  <div id="tractateList"></div>
  <div id="craftContainer"></div>

  <script>
    let data;

    async function loadData() {
      const response = await fetch('data.json');
      data = await response.json();

      const list = document.getElementById('tractateList');
      Object.keys(data.tractates).forEach(id => {
        if(id !== "fragment"){ // не показуємо уривок як кнопку
          const btn = document.createElement('div');
          btn.className = 'tractate-name';
          btn.textContent = data.tractates[id].name;
          btn.onclick = () => showPath(id);
          list.appendChild(btn);
        }
      });
    }

    function buildPath(id) {
      const t = data.tractates[id];
      if (!t) return null;

      const li = document.createElement('li');
      li.textContent = t.name;

      if (t.craft.length > 0) {
        const ul = document.createElement('ul');
        t.craft.forEach(childId => {
          const child = buildPath(childId);
          if (child) ul.appendChild(child);
        });
        li.appendChild(ul);
      }
      return li;
    }

    function showPath(id) {
      const container = document.getElementById('craftContainer');
      container.innerHTML = "";
      const root = buildPath(id);
      const ul = document.createElement('ul');
      ul.appendChild(root);
      container.appendChild(ul);
    }

    loadData();
  </script>
</body>
</html>
