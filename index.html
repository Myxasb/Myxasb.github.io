<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Повний шлях крафту</title>
  <style>
    body { font-family: sans-serif; text-align: center; }
    .tractate-name {
      display: inline-block;
      margin: 10px;
      padding: 10px;
      border: 1px solid #333;
      cursor: pointer;
    }
    .craft-path {
      margin: 15px auto;
      border: 1px solid #666;
      padding: 10px;
      width: 70%;
      text-align: left;
    }
    ul { list-style: none; padding-left: 20px; }
    li { margin: 5px 0; }
  </style>
</head>
<body>
  <h1>Крафт трактатів</h1> 
      <div id="tractateList"></div>
      <div id="summary"></div>
      <div id="pyramid"></div>

<script>
let data;

async function loadData() {
  const response = await fetch('data.json');
  data = await response.json();

  const list = document.getElementById('tractateList');
  Object.keys(data.tractates).forEach(id => {
    const t = data.tractates[id];
    if(t.visible){
      const btn = document.createElement('button');
      btn.textContent = t.name;
      btn.onclick = () => showPyramid(id);
      list.appendChild(btn);
    }
  });
}

function countAll(id, counts) {
  const t = data.tractates[id];
  if (!t) return 0;

  // якщо це базовий ресурс (немає craft)
  if (t.craft.length === 0) {
    counts[id] = (counts[id] || 0) + 1;
    return 1;
  }

  // додаємо сам трактат
  counts[id] = (counts[id] || 0) + 1;

  let sum = 0;
  t.craft.forEach(childId => {
    // якщо childId є базовим ресурсом (наприклад fragment, page)
    if (data.tractates[childId]) {
      sum += countAll(childId, counts);
    } else {
      // якщо це просто "сировина" без опису в tractates
      counts[childId] = (counts[childId] || 0) + 1;
      sum += 1;
    }
  });
  return sum;
}


function showPyramid(id) {
  const counts = {};
  const total = countAll(id, counts);

  document.getElementById('summary').innerHTML =
    `<h3>${data.tractates[id].name}</h3>
     <p><b>Потрібно ${total} уривків</b></p>`;

  const pyramid = document.getElementById('pyramid');
  pyramid.innerHTML = "";

  // групуємо по рівнях
  const levels = {};
  Object.keys(counts).forEach(name => {
    const tractate = Object.values(data.tractates).find(t => t.name === name);
    if (tractate) {
      const lvl = tractate.level || 0;
      if (!levels[lvl]) levels[lvl] = [];
      levels[lvl].push({id, name: tractate.name, count: counts[tractate.name] });
    }
  });

  // сортуємо від найбільшого рівня (кінцевий трактат) до найменшого (уривки)
  Object.keys(levels).sort((a,b)=>b-a).forEach(lvl => {
    const row = document.createElement('div');
    row.className = 'level';
    row.style.display = "flex";
    row.style.justifyContent = "center";

    levels[lvl].forEach(t => {
      const block = document.createElement('div');
      block.className = 'tractate';
      const image = `images/${t.id}.png`;
      block.innerHTML = `
        <img src="${image}" alt="${t.name} x${t.count}" style="width:36px;height:36px;"><br>
        ${t.name}<span> x${t.count}</span>
      `;
      block.onclick = () => showPyramid(t.id);
      row.appendChild(block);
    });

    pyramid.appendChild(row);
  });
}

loadData();
</script>
</body>
</html>
